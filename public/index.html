<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wedding-base-path" content="/">
  <title>Shoaib & Zeenath | Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="envelope-page">
  <div id="envelope-overlay" class="envelope-overlay" role="dialog" aria-modal="true" aria-label="Wedding invitation envelope">
    <div class="envelope-stage">
      <div class="envelope-glow" aria-hidden="true"></div>
      <div class="envelope-royal-frame" aria-hidden="true"></div>
      <div class="envelope" aria-hidden="true">
        <div class="envelope-back"></div>
        <div class="envelope-lining" aria-hidden="true"></div>
        <div class="envelope-card">
          <div class="envelope-card-border" aria-hidden="true"></div>
          <span class="envelope-card-crest" aria-hidden="true">✦</span>
          <span class="envelope-card-eyebrow">Shoaib &amp; Zeenath</span>
          <span class="envelope-card-divider" aria-hidden="true"></span>
          <span class="envelope-card-title">Wedding Invitation</span>
          <span class="envelope-card-sub">With love &amp; blessings</span>
        </div>
        <div class="envelope-pocket"></div>
        <div class="envelope-flap">
          <div class="envelope-flap-inner" aria-hidden="true"></div>
        </div>
        <div class="envelope-seal" aria-hidden="true">
          <span class="envelope-seal-ring" aria-hidden="true"></span>
          <span class="envelope-seal-text">S&amp;Z</span>
        </div>
      </div>
      <div class="envelope-open-shine" aria-hidden="true"></div>
    </div>
    <button type="button" id="envelope-open" class="envelope-cta">
      <span class="envelope-cta-eyebrow">Shoaib &amp; Zeenath</span>
      <span class="envelope-cta-text">Click here to open the invitation</span>
    </button>
  </div>

  <audio id="bg-music" loop preload="auto" playsinline aria-hidden="true"></audio>
  <button type="button" id="music-toggle" class="music-toggle" aria-label="Play background music" aria-pressed="false" title="Wedding background music">
    <span class="music-toggle-icon" aria-hidden="true">♪</span>
    <span class="music-toggle-label">Play music</span>
  </button>

  <script src="wedding-assets.js"></script>
  <script src="wedding-music-boot.js"></script>
  <script src="envelope.js"></script>
</body>
</html>
